name: Build plugin

on:
  push:
    branch:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build plugin
        run: ./build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: tls-manager-plugin
          path: target/tls-manager.zip
