name: Build plugin

on:
  workflow_dispatch:
  push:
    branch:
      - master

jobs:
  build-webui:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout WebUI
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            web-ui/

      - name: Prepare directory
        run: |
          shopt -s dotglob
          mv web-ui/* .
          rm -rf web-ui

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prepare archive
        run: |
          mkdir tls-manager/WEB-INF
          cp static/web.xml tls-manager/WEB-INF/

      - name: Create archive
        run: jar -cvf tls-manager.war -C tls-manager .

      - uses: actions/upload-artifact@v6
        with:
          name: tls-manager-ui
          path: tls-manager.war

  build-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build plugin
        run: ./build.sh

      - uses: actions/upload-artifact@v6
        with:
          name: tls-manager-plugin
          path: target/tls-manager*.zip

  package-ui:
    runs-on: ubuntu-latest
    needs:
      - build-plugin
      - build-webui
    steps:
      - uses: actions/download-artifact@v6
        with:
          pattern: tls-manager-*

      - name: Add UI to plugin zip
        run: |
          tree .
          mv tls-manager-ui/  tls-manager/
          ZIP_NAME=$(find tls-manager-plugin/ -maxdepth 1 -name "tls-manager-*" -exec basename {} \;)
          zip -g tls-manager-plugin/"$ZIP_NAME" tls-manager/tls-manager.war

      - uses: actions/upload-artifact@v6
        with:
          name: tls-manager-plugin-webui
          path: tls-manager-plugin/tls-manager-*.zip
